[colors]
background = #a0000000
background-alt = #a0bb1854
foreground = #ffffff
primary = #e3256b
secondary = #1cda94

[bar/default]
width = 98.895%
height = 32
radius = 6

offset-x = 0.5525%
offset-y = 5 

enable-ipc = true

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 2
border-color = ${colors.primary}

padding-left = 0
padding-right = 1
padding-top = 5

module-margin = 1

font-0 = "FiraCode NerdFont"
font-1 = "Noto Sans CjK JP"

modules-left = workspaces tray
modules-center = cava
modules-right = backlight pulseaudio cpu memory battery date

override-redirect = true
wm-restack = bspwm 

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true

format = <ramp><label>
label = %percentage%%

ramp-foreground = ${colors.primary}
ramp-0 = "َ°ƒڑ "
ramp-1 = "َ°ƒ› "
ramp-2 = "َ°ƒœ "
ramp-3 = "َ°ƒ‌ "
ramp-4 = "َ°ƒ‍ "
ramp-5 = "َ°ƒں "
ramp-6 = "َ°ƒ  "

[module/memory]
type = internal/memory

format = <label>
format-prefix = "î‰¦ "
format-prefix-foreground = ${colors.primary}

ramp-used-0 = â–پ
ramp-used-1 = â–‚
ramp-used-2 = â–ƒ
ramp-used-3 = â–„
ramp-used-4 = â–…
ramp-used-5 = â–†
ramp-used-6 = â–‡
ramp-used-7 = â–ˆ

[module/tray]
type = internal/tray

tray-size = 60%

[module/temperature]
type = internal/temperature

[module/workspaces]
type = internal/xworkspaces

pin-workspaces = true

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-empty = %name%
label-empty-padding = 1

label-occupied = %name%
label-occupied-padding = 1

[module/window]
type = internal/xwindow
label = %title%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "َ°•¾ "
format-muted-prefix = "َ°–پ "
format-volume-prefix-foreground = ${colors.primary}
format-muted-prefix-foregound = ${colors.primary}
format-volume = <label-volume>
format-muted = <label-muted>

label-volume = %percentage%%
label-muted = muted

[module/cava]
type = custom/script
tail = true
exec = $HOME/.config/polybar/scripts/cava.sh
format = <label>
format-font = 5
label = %output%

[module/cpu]
type = internal/cpu
interval = 2

format = <label> <ramp-coreload> 
format-prefix = "ï’¼  "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

ramp-coreload-spacing = 0
ramp-coreload-0 = â–پ
ramp-coreload-1 = â–‚
ramp-coreload-2 = â–ƒ
ramp-coreload-3 = â–„
ramp-coreload-4 = â–…
ramp-coreload-5 = â–†
ramp-coreload-6 = â–‡
ramp-coreload-7 = â–ˆ

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD

format-charging = <ramp-capacity><label-charging>
format-discharging = <ramp-capacity><label-discharging>
format-full = <ramp-capacity><label-full>

label-charging = +%percentage%%
label-discharging = -%percentage%%
label-full = %percentage%% 

ramp-capacity-foreground = ${colors.primary}
ramp-capacity-0 = "َ°‚ژ"
ramp-capacity-1 = "َ°پ؛"
ramp-capacity-2 = "َ°پ»"
ramp-capacity-3 = "َ°پ¼"
ramp-capacity-4 = "َ°پ½"
