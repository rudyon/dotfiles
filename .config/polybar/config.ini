[colors]
background = #a0000000
background-alt = #a0bb1854
foreground = #ffffff
primary = #e3256b
secondary = #1cda94

[bar/default]
width = 98.895%
height = 32
radius = 6

offset-x = 0.5525%
offset-y = 5 

enable-ipc = true

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 2
border-color = ${colors.primary}

padding-left = 0
padding-right = 1
padding-top = 5

module-margin = 1

font-0 = "FiraCode NerdFont"
font-1 = "Noto Sans CjK JP"

modules-left = workspaces window
modules-right = tray now-playing pulseaudio cpu battery date

override-redirect = true
wm-restack = bspwm 

[module/now-playing]
type = custom/script
tail = true
format = <label>
exec = $HOME/.config/polybar/scripts/polybar-now-playing.py
click-right = "kill -USR1 $(pgrep --oldest --parent %pid%)"

[module/tray]
type = internal/tray

tray-size = 60%

[module/temperature]
type = internal/temperature

[module/workspaces]
type = internal/xworkspaces

pin-workspaces = true

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-empty = %name%
label-empty-padding = 1

label-occupied = %name%
label-occupied-padding = 1

[module/window]
type = internal/xwindow
label = %title%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "󰕾 "
format-muted-prefix = "󰖁 "
format-volume-prefix-foreground = ${colors.primary}
format-muted-prefix-foregound = ${colors.primary}
format-volume = <label-volume>
format-muted = <label-muted>

label-volume = %percentage%%
label-muted = muted

[module/cava]
type = custom/script
tail = true
exec = $HOME/.config/polybar/scripts/cava.sh
format = <label>
format-font = 5
label = %output%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD

format-charging-prefix = "󱐋 "
format-discharging-prefix = "󱐋 "
format-full-prefix = "󱐋 "
format-charging-prefix-foreground = ${colors.primary}
format-discharging-prefix-foreground = ${colors.primary}
format-full-prefix-foreground = ${colors.primary}
format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>

label-charging = +%percentage%%
label-discharging = -%percentage%%
label-full = full

[module/date]
type = internal/date
interval = 1

time = %I:%M %p
time-alt = %c

label = %time%
format-prefix = "󰞌 "
format-prefix-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

[bar/extra]
width = 100%
height = 24pt
radius = 6

monitor = HDMI-1

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 6pt
border-color = #00

padding-left = 0
padding-right = 1

module-margin = 1

font-0 = "FiraCode NerdFont"
font-1 = "Noto Sans CjK JP"

modules-left = workspaces window
modules-right = tray now-playing pulseaudio cpu battery date

wm-restack = bspwm
