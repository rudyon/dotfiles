[module/date]
type = internal/date
interval = 1

time = %I:%M %p
time-alt = %c

label = %time%
format-prefix = "َ°‍Œ "
format-prefix-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true
